<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nubia Pro — Back-office · maquettes hi-fi</title>
<link rel="stylesheet" href="lib/tokens.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  #theme-bar {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 300; display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
    border: 1px solid rgba(0,0,0,0.07); border-radius: 999px;
    padding: 7px 8px 7px 16px; box-shadow: 0 4px 20px rgba(28,25,23,0.10);
    font-family: 'Inter', system-ui, sans-serif;
  }
  #theme-bar .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; color: #1C1917; letter-spacing: -0.2px; }
  #theme-bar .dot { width: 18px; height: 18px; border-radius: 50%; background: #047857; display: inline-flex; align-items: center; justify-content: center; }
  #theme-bar .seg { display: flex; gap: 2px; background: #F5F5F4; border-radius: 999px; padding: 3px; }
  #theme-bar .seg button { border: none; background: transparent; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; color: #78716C; padding: 6px 14px; border-radius: 999px; transition: all .15s; }
  #theme-bar .seg button.on { background: #fff; color: #1C1917; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  #theme-bar .pro { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: #A8A29E; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="lib/components.jsx"></script>
<script type="text/babel" src="lib/bo-components.jsx"></script>
<script type="text/babel" src="lib/bo-secr-dash.jsx"></script>
<script type="text/babel" src="lib/bo-secr-screens.jsx"></script>
<script type="text/babel" src="lib/bo-praticien.jsx"></script>
<script type="text/babel" src="lib/bo-praticien-2.jsx"></script>

<script type="text/babel">
const { useState } = React;

const WW = 1400, WH = 904, AW = WW + 48, AH = WH + 44;

function Win({ url, tab, children }) {
  return (
    <div style={{ width: AW, height: AH, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <ChromeWindow width={WW} height={WH} url={url} tabs={[{ title: tab }]}>{children}</ChromeWindow>
    </div>
  );
}
const board = (id, label, url, dark, Comp) => (
  <DCArtboard id={id} label={label} width={AW} height={AH} style={{ background: 'transparent', boxShadow: 'none' }}>
    <Win url={url} tab="Nubia Pro"><Comp dark={dark} /></Win>
  </DCArtboard>
);

function Brief() {
  const Tag = ({ c, children }) => <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, font: "500 13px/1 'Inter'", color: '#57534E' }}><span style={{ width: 10, height: 10, borderRadius: 3, background: c }} />{children}</span>;
  return (
    <div className="nubia" style={{ width: 560, height: AH, background: '#fff', padding: '46px 42px', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
        <span style={{ width: 30, height: 30, borderRadius: 8, background: '#047857', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: '#fff' }}><Icon name="plus" size={18} stroke={2.6} /></span>
        <span style={{ font: "600 19px/1 'Inter'", color: '#1C1917' }}>Nubia <span style={{ color: '#A8A29E', fontWeight: 600, fontSize: 13 }}>Pro</span></span>
        <span className="t-caption" style={{ color: '#A8A29E', marginLeft: 'auto' }}>Back-office · v1</span>
      </div>
      <div className="t-h1" style={{ color: '#1C1917', marginTop: 18, fontSize: 26, lineHeight: '34px', textWrap: 'balance' }}>
        L'autre face de la marketplace — le poste de travail du cabinet.
      </div>
      <p className="t-body" style={{ color: '#57534E', marginTop: 12, textWrap: 'pretty' }}>
        Desktop (Flutter Web), même design system que l'app patient mais <b>dense et Inter partout</b> — pas de Fraunces.
        Deux rôles, deux expériences sur un socle commun.
      </p>

      <div style={{ font: "600 12px/1 'Inter'", letterSpacing: 1.2, textTransform: 'uppercase', color: '#A8A29E', margin: '26px 0 12px' }}>Deux rôles</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <div style={{ display: 'flex', gap: 12, padding: 14, border: '1px solid #E7E5E4', borderRadius: 12 }}>
          <span style={{ width: 38, height: 38, borderRadius: 9, background: '#F3EAD7', color: '#876435', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name="users" size={20} stroke={2} /></span>
          <div><div style={{ font: "600 14px/1.3 'Inter'", color: '#1C1917' }}>Secrétariat — Sonia</div>
            <div className="t-caption" style={{ color: '#78716C', marginTop: 2 }}>Tableau de bord opérationnel, salle d'attente live, agenda, devis & paiements, liste d'attente. <b>Vue administrative.</b></div></div>
        </div>
        <div style={{ display: 'flex', gap: 12, padding: 14, border: '1px solid #E7E5E4', borderRadius: 12 }}>
          <span style={{ width: 38, height: 38, borderRadius: 9, background: '#ECFDF5', color: '#065F46', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name="stethoscope" size={20} stroke={2} /></span>
          <div><div style={{ font: "600 14px/1.3 'Inter'", color: '#1C1917' }}>Praticien — Dr Marin</div>
            <div className="t-caption" style={{ color: '#78716C', marginTop: 2 }}>Agenda, messagerie priorisée, dossier clinique (odontogramme, plan de traitement), salle d'attente. <b>Vue clinique.</b></div></div>
        </div>
      </div>

      <div style={{ marginTop: 'auto', paddingTop: 18, borderTop: '1px solid #E7E5E4', display: 'flex', gap: 18, alignItems: 'center', flexWrap: 'wrap' }}>
        <Tag c="#047857">cloisonnement</Tag><Tag c="#0E7490">salle d'attente SSE</Tag><Tag c="#B0894F">le wedge côté cabinet</Tag>
      </div>
    </div>
  );
}

function App() {
  const [dark, setDark] = useState(false);
  const U = 'pro.nubia.fr';
  return (
    <React.Fragment>
      <div id="theme-bar">
        <span className="brand"><span className="dot"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg></span>Nubia</span>
        <span className="pro">Pro</span>
        <div className="seg">
          <button className={!dark ? 'on' : ''} onClick={() => setDark(false)}>Clair</button>
          <button className={dark ? 'on' : ''} onClick={() => setDark(true)}>Sombre</button>
        </div>
      </div>

      <DesignCanvas>
        <DCSection id="brief" title="Brief — back-office" subtitle="Deux rôles, un socle · cloisonnement praticien / secrétariat">
          <DCArtboard id="intro" label="Lecture" width={560} height={AH} style={{ background: 'transparent', boxShadow: 'none' }}>
            <Brief />
          </DCArtboard>
        </DCSection>

        <DCSection id="secr-dash" title="★ Secrétariat — Tableau de bord" subtitle="L'écran hero, 3 directions : classique, centre de pilotage, triage par actions">
          {board('dashA', 'A · Classique', U + '/secretariat/tableau-de-bord', dark, ScreenSecrDashA)}
          {board('dashB', 'B · Centre de pilotage', U + '/secretariat/tableau-de-bord', dark, ScreenSecrDashB)}
          {board('dashC', 'C · Triage par actions', U + '/secretariat/tableau-de-bord', dark, ScreenSecrDashC)}
        </DCSection>

        <DCSection id="secr-ops" title="Secrétariat — Opérations" subtitle="Agenda du cabinet, fiche patient (admin), suivi devis & paiements, liste d'attente">
          {board('agenda', 'Agenda du cabinet', U + '/secretariat/agenda', dark, ScreenSecrAgenda)}
          {board('fiche', 'Fiche patient · administratif', U + '/secretariat/patients/rousseau', dark, ScreenSecrFiche)}
          {board('devis', 'Devis & paiements', U + '/secretariat/devis', dark, ScreenSecrDevis)}
          {board('attente', "Liste d'attente", U + '/secretariat/liste-attente', dark, ScreenSecrAttente)}
        </DCSection>

        <DCSection id="prat-join" title="App praticien — rejoindre Nubia & piloter" subtitle="Création de compte, inscription au service (RPPS), profil public, et tableau de bord praticien">
          {board('boauth', 'Création de compte', U + '/inscription', dark, ScreenBOAuth)}
          {board('pInscription', 'Inscription · vérification RPPS', U + '/inscription/rpps', dark, ScreenPratInscription)}
          {board('pProfilPublic', 'Profil public & créneaux', U + '/praticien/profil-public', dark, ScreenPratProfilPublic)}
          {board('pDash', 'Tableau de bord praticien', U + '/praticien/tableau-de-bord', dark, ScreenPratDash)}
        </DCSection>

        <DCSection id="prat" title="Praticien — Dr Marin" subtitle="Agenda, messagerie priorisée, dossier clinique, salle d'attente — vue clinique">
          {board('pAgenda', 'Mon agenda', U + '/praticien/agenda', dark, ScreenPratAgenda)}
          {board('pMsg', 'Messagerie priorisée', U + '/praticien/messagerie', dark, ScreenPratMessagerie)}
          {board('pFiche', 'Dossier patient · clinique', U + '/praticien/patients/dubois', dark, ScreenPratFiche)}
          {board('pSalle', "Salle d'attente live", U + '/praticien/salle-attente', dark, ScreenPratSalle)}
        </DCSection>
      </DesignCanvas>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
