# CI base de données (db/) — applique les migrations FROM SCRATCH puis lance les
# tests pgTAP (le contrat) sous le rôle nubia_app.
#
# IMPORTANT — Postgres inline (vs services:):
# Le bloc `services:` de Forgejo Actions n'expose pas correctement le DNS du
# service container sur notre act_runner (host 'postgres' = NXDOMAIN). On
# démarre donc Postgres INLINE dans le job container (db-ci:stable contient
# déjà tout le binaire postgres + extensions). Avantage bonus : un seul
# container = pas de problème de réseau, identique au sidecar du
# postgres-agent (cf. agentInfra/agents/templates/postgres-agent.yaml).
#
# Pré-requis : image db-ci:stable construite/chargée dans le runner DinD via
# ./ci/db/load-into-runner.sh (force_pull: false côté runner — image locale).
on: [push, pull_request]
jobs:
  db-test:
    runs-on: docker
    container:
      image: db-ci:stable
    env:
      PGHOST: localhost
      PGPORT: "5432"
      ADMIN_USER: postgres
      DB_NAME: nubia
      DATABASE_URL: postgres://nubia_owner@localhost:5432/nubia
      APP_DATABASE_URL: postgres://nubia_app@localhost:5432/nubia
      SEED_DATABASE_URL: postgres://nubia_seed@localhost:5432/nubia
      PGDATA: /tmp/pgdata
    steps:
      - uses: actions/checkout@v4
      - name: Init + start Postgres inline (trust auth, listen sur localhost)
        run: |
          set -e
          rm -rf $PGDATA && mkdir -p $PGDATA
          chown -R postgres:postgres $PGDATA 2>/dev/null || true
          gosu postgres initdb -D $PGDATA --auth-host=trust --auth-local=trust --username=postgres 2>&1 | tail -3
          gosu postgres pg_ctl -D $PGDATA -l /tmp/pg.log -o "-c listen_addresses='localhost'" start
          for i in $(seq 1 30); do
            if pg_isready -h localhost -U postgres -q; then
              echo "[ok] postgres ready after ${i}s"
              break
            fi
            sleep 1
          done
          psql -h localhost -U postgres -d postgres -c "SELECT version();" | head -3
      - name: Versions
        run: psql --version && sqlx --version && pg_prove --version
      - name: Tests (reset → migrate → pgTAP sous nubia_app)
        working-directory: db
        run: make test
      - name: Seed déterministe + garde-fous RLS
        working-directory: db
        run: make seed verify-rls lint
