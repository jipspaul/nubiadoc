# Flutter test workflow.
#
# Requires Forgejo Actions configured with FORGEJO__actions__DEFAULT_ACTIONS_URL=github
# so non-mirrored third-party actions like subosito/flutter-action@v2 fall back to
# github.com instead of data.forgejo.org (which only hosts a curated set).
#
# Container is node:22-bookworm (not the cirruslabs/flutter image) because Forgejo
# Actions executes JS actions inside the container and needs node in PATH.
on: [push, pull_request]
jobs:
  flutter-test:
    runs-on: docker
    container:
      image: node:22-bookworm
    steps:
      - uses: actions/checkout@v4
      - name: Install Flutter prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends curl unzip xz-utils ca-certificates git
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Flutter version
        working-directory: flutter_demo
        run: flutter --version
      - name: Pub get
        working-directory: flutter_demo
        run: flutter pub get
      - name: Analyze
        working-directory: flutter_demo
        run: flutter analyze --fatal-infos
      - name: Test
        working-directory: flutter_demo
        run: flutter test
