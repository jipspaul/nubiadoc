on: [pull_request]

# Cancel old in-progress runs when new commits push to the same PR/branch.
# Saves runner time on auto-rebase + force-push cycles.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
jobs:
  web-e2e:
    runs-on: docker
    container:
      image: mcr.microsoft.com/playwright:v1.49.1-jammy
    steps:
      - uses: actions/checkout@v4
      - working-directory: tests/e2e
        run: npm install
      - working-directory: tests/e2e
        run: npx playwright test
