name: nubia_patient
description: Nubia — Application patient mobile (iOS/Android)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.0

  # Dependency injection
  get_it: ^8.0.0
  injectable: ^2.5.0

  # Networking
  dio: ^5.8.0
  retrofit: ^4.4.1

  # Local storage
  flutter_secure_storage: ^9.2.4
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3

  # Fonts & UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # Push notifications
  firebase_messaging: ^15.2.5
  firebase_core: ^3.13.0

  # Date/time
  intl: ^0.20.2

  # Functional error handling
  dartz: ^0.10.1

  # PDF viewer
  flutter_pdfview: ^1.3.3

  # Biometrics
  local_auth: ^2.3.0

  # URL launcher (maps, links)
  url_launcher: ^6.3.1

  # Deep links
  app_links: ^6.4.0

  # Analytics
  posthog_flutter: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  injectable_generator: ^2.7.0
  retrofit_generator: ^9.1.6
  json_serializable: ^6.9.5
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  generate: true  # i18n (arb files)
  assets:
    - assets/images/
    - assets/icons/
    - assets/l10n/
